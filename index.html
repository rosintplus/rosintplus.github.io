  <meta charset="UTF-8" />


  <style>
    html, body { overflow-x: hidden; width: 100%; max-width: 100%; background-color: var(--bg, #0d0d0d); }

  <!-- Apply the cached theme before first paint to avoid a dark flash on refresh -->
  <script>
    try {
      var c = JSON.parse(localStorage.getItem("rosint-resolved"));
      if (c) {
        var d = c.mode === "dark" || (c.mode !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
        var p = d ? c.dark : c.light;
        var s = document.documentElement.style;
        s.setProperty("--bg", p.bg);
        s.setProperty("--accent", p.accent);
        s.setProperty("--tint", p.tint || p.accent);
        s.setProperty("--text-base", d ? "white" : "black");
        s.setProperty("--color-scheme", d ? "dark" : "light");
        var _t = p.tint || p.accent, _b = d ? "white" : "black";
        s.setProperty("--text", "color-mix(in srgb, " + _t + " 30%, " + _b + ")");
        s.setProperty("--text-muted", "color-mix(in srgb, " + _t + " 30%, color-mix(in srgb, " + _b + " 65%, " + p.bg + "))");
      }
    } catch (e) { /* first visit or corrupted cache — default palette applies */ }
  </script>
